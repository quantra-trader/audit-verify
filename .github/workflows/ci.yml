name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify zero dependencies
        shell: bash
        run: |
          if [ -d "node_modules" ]; then
            echo "❌ node_modules/ should not exist — verifier must be 0-dep"
            exit 1
          fi
          deps=$(node -e "const p=require('./package.json');console.log(Object.keys(p.dependencies||{}).length+Object.keys(p.devDependencies||{}).length)")
          if [ "$deps" != "0" ]; then
            echo "❌ package.json must have ZERO dependencies + devDependencies"
            exit 1
          fi
          echo "✅ Zero dependencies confirmed"

      - name: Generate test fixtures
        run: node tests/generate-fixtures.mjs

      - name: Run test suite
        run: npm test

      - name: Smoke test CLI — valid chain (exit 0)
        shell: bash
        run: |
          node verify.mjs tests/fixtures/valid-chain.json
          if [ $? -ne 0 ]; then
            echo "❌ valid-chain.json should exit 0"
            exit 1
          fi

      - name: Smoke test CLI — tampered payload (exit 1)
        shell: bash
        run: |
          set +e
          node verify.mjs tests/fixtures/tampered-payload.json
          rc=$?
          set -e
          if [ $rc -ne 1 ]; then
            echo "❌ tampered-payload.json should exit 1, got $rc"
            exit 1
          fi
          echo "✅ tampered-payload.json correctly exited 1"

      - name: Smoke test CLI — usage error (exit 2)
        shell: bash
        run: |
          set +e
          node verify.mjs
          rc=$?
          set -e
          if [ $rc -ne 2 ]; then
            echo "❌ no-args should exit 2, got $rc"
            exit 1
          fi
          echo "✅ no-args correctly exited 2"
